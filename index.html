<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Mail Portal</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #141414; /* Netflix dark background */
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding-top: 50px;
        }
        .netflix-red { color: #E50914; text-align: center; }

        /* --- LOGIN SCREEN STYLES --- */
        #login-screen {
            background-color: rgba(0, 0, 0, 0.75);
            padding: 40px 60px;
            border-radius: 5px;
            width: 100%;
            max-width: 350px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .input-group { margin-bottom: 20px; }
        .input-group input {
            width: 100%;
            padding: 15px;
            background: #333;
            border: none;
            border-radius: 4px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        button.login-btn {
            width: 100%;
            padding: 15px;
            background-color: #E50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button.login-btn:hover { background-color: #f40612; }
        #login-error { color: #e87c03; margin-top: 15px; text-align: center; display: none; }

      /* --- APP SCREEN (Layout) --- */
        #app-screen {
            display: none; 
            width: 100%;
            padding-top: 70px; /* Make room for the fixed navbar */
        }

        /* --- NAVBAR STYLES --- */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: #000000; /* Pure black header */
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .navbar-brand {
            color: #E50914;
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        #welcome-message {
            margin: 0;
            margin-right: 15px;
            color: #aaa;
            font-size: 14px;
        }

        .action-btn { 
            padding: 8px 15px; 
            border: none; 
            cursor: pointer; 
            border-radius: 4px; 
            font-weight: bold; 
            background: #333; 
            color: white;
            font-size: 14px;
            transition: 0.2s;
        }
        .action-btn:hover { background: #555; }
        .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #admin-btn { display: none; background: #fff; color: #141414; }
        #admin-btn:hover { background: #ddd; }
        
        #logout-btn { background: transparent; border: 1px solid #aaa; color: #aaa; }
        #logout-btn:hover { color: white; border-color: white; }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            width: 100%;
            max-width: 900px;
            margin: 0 auto; /* Centers the content */
            padding: 30px 20px;
            box-sizing: border-box;
        }
        
        /* The email accordion styles */
        .email-header {
            background-color: #222; /* Slightly darker cards */
            color: white;
            padding: 15px 20px;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            border: 1px solid #333;
        }
        .email-header:hover { background-color: #333; }
        .email-content {
            display: none;
            border-radius: 0 0 5px 5px;
            overflow: hidden; 
            background: #000;
            border: 1px solid #333;
            border-top: none;
        }
        .email-card.active .email-content { display: block; }
        .email-card.active .email-header { background-color: #E50914; border-color: #E50914; border-radius: 5px 5px 0 0; }
        /* --- ADMIN DASHBOARD STYLES --- */
        #admin-btn { display: none; background: #fff; color: #141414; padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; margin-bottom: 20px;}
        #admin-btn:hover { background: #ddd; }
        
        #admin-screen { display: none; width: 100%; max-width: 800px; padding: 20px; background: #222; border-radius: 5px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #333; }
        th, td { padding: 12px; border: 1px solid #444; text-align: left; }
        th { background: #E50914; color: white; }
        .role-btn { padding: 5px 10px; cursor: pointer; background: #555; color: white; border: none; border-radius: 3px; }
        .role-btn:hover { background: #777; }
        
        .add-user-form { display: flex; gap: 10px; margin-top: 20px; }
        .add-user-form input, .add-user-form select { padding: 10px; flex: 1; border-radius: 3px; border: none; }
        .delete-btn { padding: 5px 10px; cursor: pointer; background: #E50914; color: white; border: none; border-radius: 3px; margin-left: 5px; }
        .delete-btn:hover { background: #b20710; }

        /* --- DASHBOARD BUTTONS --- */
        .header-actions { display: flex; gap: 10px; margin-bottom: 20px; }
        .action-btn { padding: 10px 15px; border: none; cursor: pointer; border-radius: 4px; font-weight: bold; }
        
        #refresh-btn { background: #333; color: white; }
        #refresh-btn:hover { background: #555; }
        #refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }


        /* --- MODERN PROFILE ICON --- */
        #admin-btn {
            display: none; /* Hidden by default */
            width: 40px;
            height: 40px;
            border-radius: 4px; /* Netflix style rounded square */
            background-color: #E50914;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
        }
        #admin-btn:hover { opacity: 0.8; transform: scale(1.05); }

        /* --- VIEW CONTAINERS --- */
        #inbox-view { display: block; }
        #admin-view { display: none; background: #222; padding: 30px; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h2 class="netflix-red">Sign In</h2>
        <div class="input-group">
            <input type="email" id="email" placeholder="Email or phone number" required>
        </div>
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <button class="login-btn" onclick="attemptLogin()">Sign In</button>
        <p id="login-error">Invalid credentials. Please try again.</p>
    </div>

<div id="app-screen">
        
        <nav class="navbar">
            <h1 class="navbar-brand">Netflix Mail</h1>
            
            <div class="navbar-actions">
                <span id="welcome-message"></span>
                <button id="refresh-btn" class="action-btn" onclick="fetchEmails()">🔄 Refresh</button>
                <button id="logout-btn" class="action-btn" onclick="logout()">Logout</button>
                <button id="admin-btn" title="Admin Dashboard" onclick="goToAdmin()">SA</button>
            </div>
        </nav>

        <main class="main-content">
            
            <div id="inbox-view">
                <div id="email-container">Loading your emails...</div>
            </div>

            <div id="admin-view">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h2 class="netflix-red" style="margin: 0;">User Management</h2>
                    <button class="action-btn" style="background: #555;" onclick="goToInbox()">⬅️ Back to Inbox</button>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="user-table-body">
                        </tbody>
                </table>

                <h3 style="margin-top: 40px;">Add New User</h3>
                <div class="add-user-form">
                    <input type="email" id="new-email" placeholder="Email address" required>
                    <input type="password" id="new-password" placeholder="Password" required>
                    <select id="new-role">
                        <option value="Standard User">Standard User</option>
                        <option value="Super Admin">Super Admin</option>
                    </select>
                    <button class="login-btn" style="margin-top: 0; width: auto;" onclick="addNewUser()">Add User</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        // 1. Function to handle the login button click
        // Variables to remember who is logged in
        let currentUserEmail = '';
        let currentUserRole = '';

        async function attemptLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorText = document.getElementById('login-error');

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email, password: password })
                });
                const data = await response.json();

                if (data.success) {
                    // Save user info in memory
                    currentUserEmail = data.email;
                    currentUserRole = data.role;
                    // Change display from 'block' to 'flex' so the initials center perfectly
if (currentUserRole === 'Super Admin') document.getElementById('admin-btn').style.display = 'flex';
                    // if (currentUserRole === 'Super Admin') document.getElementById('admin-btn').style.display = 'block';

                    document.getElementById('login-screen').style.display = 'none';
                    document.getElementById('app-screen').style.display = 'block';
                    document.getElementById('welcome-message').innerText = `Welcome, ${data.role}!`;
                    errorText.style.display = 'none';
                    
                    fetchEmails();
                } else {
                    errorText.style.display = 'block';
                }
            } catch (err) { console.error(err); }
        }

        function fetchEmails() {
            const container = document.getElementById('email-container');
            const refreshBtn = document.getElementById('refresh-btn');
            
            // 1. Set the UI to a "Loading" state
            container.innerHTML = '<p style="text-align:center; color: #aaa;">Fetching latest emails...</p>';
            if (refreshBtn) {
                refreshBtn.innerHTML = '⏳ Refreshing...';
                refreshBtn.disabled = true;
            }

            fetch('/api/netflix') 
                .then(response => response.json())
                .then(emails => {
                    // 2. Reset the refresh button back to normal
                    if (refreshBtn) {
                        refreshBtn.innerHTML = '🔄 Refresh Emails';
                        refreshBtn.disabled = false;
                    }

                    container.innerHTML = ''; 

                    // --- SAFETY CHECK ---
                    if (!Array.isArray(emails)) {
                        container.innerHTML = `<p style="color: #e87c03;">Server Error: ${emails.error || 'Could not load emails.'}</p>`;
                        return;
                    }

                    if(emails.length === 0) {
                       container.innerHTML = '<p>No Netflix emails found.</p>';
                       return;
                    }
                    
                    // --- BUILD THE EMAIL CARDS ---
                    emails.forEach(email => {
                        const card = document.createElement('div');
                        card.className = 'email-card';

                        const dateObj = new Date(email.date);
                        const formattedDate = dateObj.toLocaleDateString() + ' • ' + dateObj.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                        const header = document.createElement('div');
                        header.className = 'email-header';
                        header.innerHTML = `
                            <div style="display: flex; flex-direction: column;">
                                <span style="font-size: 16px;">${email.subject}</span>
                                <span style="font-size: 12px; color: #aaa; margin-top: 5px; font-weight: normal;">${formattedDate}</span>
                            </div>
                            <span class="arrow" style="font-size: 20px;">▼</span>
                        `;

                        const content = document.createElement('div');
                        content.className = 'email-content';
                        content.innerHTML = '<p style="text-align:center; padding: 20px; color: white;">Loading secure email...</p>'; 

                        header.addEventListener('click', async () => {
                            const isActive = card.classList.contains('active');
                            
                            if (isActive) {
                                card.classList.remove('active');
                                header.querySelector('.arrow').textContent = '▼';
                                return;
                            }

                            try {
                                const response = await fetch('/api/view-email', {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({ emailId: email.id, userEmail: currentUserEmail, role: currentUserRole })
                                });
                                
                                const data = await response.json();

                                if (data.success) {
                                    content.innerHTML = ''; 
                                    
                                    const iframe = document.createElement('iframe');
                                    iframe.style.width = '100%';
                                    iframe.style.border = 'none';
                                    iframe.style.backgroundColor = '#ffffff';
                                    content.appendChild(iframe);

                                    const iframeDoc = iframe.contentWindow.document;
                                    iframeDoc.open();
                                    iframeDoc.write(data.body);
                                    iframeDoc.close();

                                    function adjustIframeHeight() {
                                        if (iframe.contentWindow.document.body) {
                                            const newHeight = iframe.contentWindow.document.documentElement.scrollHeight;
                                            iframe.style.height = newHeight + 'px';
                                        }
                                    }

                                    adjustIframeHeight();
                                    iframe.onload = adjustIframeHeight;
                                    setTimeout(adjustIframeHeight, 500);

                                    card.classList.add('active');
                                    header.querySelector('.arrow').textContent = '▲';
                                } else if (data.error === 'LIMIT_REACHED') {
                                    alert('🔒 24-HOUR LIMIT REACHED: ' + data.message);
                                }
                            } catch (err) {
                                alert('Error loading email.');
                            }
                        });

                        card.appendChild(header);
                        card.appendChild(content);
                        container.appendChild(card);
                    });
                })
                .catch(err => {
                    // Just in case the network fails entirely
                    if (refreshBtn) {
                        refreshBtn.innerHTML = '🔄 Refresh Emails';
                        refreshBtn.disabled = false;
                    }
                    document.getElementById('email-container').innerHTML = '<p style="color: red;">Network error. Please try again.</p>';
                });
        }
        
        // --- PAGE ROUTING LOGIC ---
        function goToAdmin() {
            document.getElementById('inbox-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
            loadUsers(); // Fetch users when the page opens
        }

        function goToInbox() {
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('inbox-view').style.display = 'block';
            fetchEmails(); // Refresh emails when coming back
        }
        // Fetch users from the server
        async function loadUsers() {
            try {
                const response = await fetch(`/api/users?role=${currentUserRole}`);
                const users = await response.json();
                
                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = ''; // Clear old rows

                users.forEach(user => {
                    const row = document.createElement('tr');
                    
                    // Create a toggle button that switches their role
                    const newRole = user.role === 'Super Admin' ? 'Standard User' : 'Super Admin';
                    
                    row.innerHTML = `
                        <td>${user.email}</td>
                        <td><strong>${user.role}</strong></td>
                        <td>
                            <button class="role-btn" onclick="changeRole('${user.email}', '${newRole}')">
                                Make ${newRole}
                            </button>
                            <button class="delete-btn" onclick="deleteUser('${user.email}')">
                                Delete
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (err) { alert('Failed to load users.'); }
        }

        // Add a new user to the database
        async function addNewUser() {
            const email = document.getElementById('new-email').value;
            const password = document.getElementById('new-password').value;
            const role = document.getElementById('new-role').value;

            if (!email || !password) return alert("Please fill out all fields.");

            try {
                const response = await fetch('/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requesterRole: currentUserRole, email, password, role })
                });
                
                const data = await response.json();
                if (data.success) {
                    alert('User added successfully!');
                    document.getElementById('new-email').value = '';
                    document.getElementById('new-password').value = '';
                    loadUsers(); // Refresh the table
                } else {
                    alert(data.message);
                }
            } catch (err) { alert('Error adding user.'); }
        }

        // Change an existing user's role
        async function changeRole(targetEmail, newRole) {
            try {
                const response = await fetch('/api/users/role', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requesterRole: currentUserRole, targetEmail, newRole })
                });
                
                if (response.ok) {
                    loadUsers(); // Refresh the table to show the new role
                }
            } catch (err) { alert('Error changing role.'); }
        }

        // Delete a user securely
        async function deleteUser(targetEmail) {
            // Built-in browser confirmation box to prevent accidental clicks
            const isConfirmed = confirm(`Are you sure you want to permanently delete ${targetEmail}?`);
            if (!isConfirmed) return;

            try {
                const response = await fetch('/api/users', {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ requesterRole: currentUserRole, targetEmail: targetEmail })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    loadUsers(); // Refresh the table to remove the user from the screen
                } else {
                    alert(data.error || 'Failed to delete user.');
                }
            } catch (err) { 
                alert('Error connecting to server.'); 
            }
        }

        // --- LOGOUT LOGIC ---
        // --- LOGOUT LOGIC ---
        function logout() {
            // 1. Clear the memory
            currentUserEmail = '';
            currentUserRole = '';
            
            // 2. Hide the Super Admin avatar button
            document.getElementById('admin-btn').style.display = 'none';
            
            // 3. Clear out old emails from the screen for security
            document.getElementById('email-container').innerHTML = '';
            
            // 4. Reset the view back to the Inbox for the next person who logs in
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('inbox-view').style.display = 'block';
            
            // 5. Swap the main screens back to the Login page
            document.getElementById('app-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
            
            // 6. Clear the login inputs
            document.getElementById('email').value = '';
            document.getElementById('password').value = '';
        }
    </script>
</body>
</html>
